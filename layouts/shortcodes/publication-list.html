<!-- Variables -->
{{ $filename := .Get "filename" | default "/publications/publications.bib" }}

<!-- Load the BibTEX-js library -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/gh/pcooksey/bibtex-js@1.0.0/src/bibtex_js.js"></script>

<!-- Custom style -->
<style>
  [class="Yuyang Wang"] {
    font-weight: bold;
  }
  .bib-collapse {
    display: none;
  }
  pre {
	font-size: 10pt;
  }
  .sections {
    margin-top: 100px;
    margin-bottom: 100px;
  }
  .section {
    margin-top: -150px;
    margin-bottom: -150px;
  }
</style>

<!-- Load the bib file -->
<bibtex src="{{ $filename }}"></bibtex>

<!-- Display publication list -->
<div class="bibtex_structure">
	<div class="sections bibtextypekey">
		<div class="section book|incollection">
			<h3>Books and Book Chapters</h3>
			<div class="sort date" extra="DESC date">
				<div class="templates"></div>
			</div>
		</div>
		<div class="section article">
			<h3>Journal Articles</h3>
			<div class="sort date" extra="DESC date">
				<div class="templates"></div>
			</div>
		</div>
		<div class="section inproceedings">
			<h3>Conference Proceedings</h3>
			<div class="sort date" extra="DESC date">
				<div class="templates"></div>
			</div>
		</div>
        <div class="section phdthesis|mastersthesis|bachelorsthesis">
			<h3>Dissertation</h3>
			<div class="sort date" extra="DESC date">
				<div class="templates"></div>
			</div>
		</div>
		<div class="section misc|techreport">
			<h3>Other Publications</h3>
			<div class="sort date" extra="DESC date">
				<div class="templates"></div>
			</div>
		</div>
	</div>
</div>

              <div class="templates"></div>
        </div>
  </div>
</div> -->

<div id="bibtex_display">
	<div class="bibtex_template">
		<p>
			<div class="if title">
				<div class="bibtexVar" id="+BIBTEXKEY+" extra="BIBTEXKEY"><a class="bibtexVar" href="http://dx.doi.org/+DOI+" extra="doi"><strong><span class="title"></span></strong></a>&nbsp;<a class="bibtexVar" href="#+BIBTEXKEY+" extra="BIBTEXKEY">#</a></div>
            </div>
            <div class="if author">
                <span class="author"><span class="first"></span>&nbsp;<span class="last"></span></span>
            </div>
            <div>
			    <span class="if journal"><em><span class="journal"></span></em></span>
			    <span class="if volume"><strong><span class="volume"></span></strong></span>
			    <span class="if number">(<span class="number"></span>),</span>
                <span class="if booktitle">In <em><span class="booktitle"></span>,</em></span>
			    <span class="if publisher"><em><span class="publisher"></span>,</em></span>
			    <span class="if institution"><span class="institution"></span>,</span>
			    <span class="if pages"><span class="pages"></span>,</span>
                <span class="if school"><span class="school"></span>,</span>
			    <span class="if month"><span class="month"></span>,</span>
			    <span class="if year"><span class="year"></span>.</span>
            </div>
			<span class="if doi">
                <span style="white-space: nowrap"> <a class="bibtexVar" href="http://dx.doi.org/+DOI+" extra="doi"><i class="ai ai-doi"></i>&nbsp;<span class="doi"></span></a>&nbsp;</span>
			</span>
            <span class="if file">
                <span><a class="bibtexVar" href="/publications/+FILE+" extra="file"><i class="fa-solid fa-file-pdf fa-fw"></i></a>&nbsp;</span>
			</span>
            <a class="bibtexVar doks-sidebar-toggle collapsed" role="button" data-bs-toggle="collapse" data-bs-target="#bib+BIBTEXKEY+" href="#bib+BIBTEXKEY+" aria-expanded="false" aria-controls="bib+BIBTEXKEY+" extra="BIBTEXKEY">
                <span class="doks-expand"><i class="fa-solid fa-quote-left fa-fw"></i></span>
                <span class="doks-collapse"><i class="fa-solid fa-quote-right fa-fw"></i></span>
            </a>
            <div class="bibtexVar collapse" id="bib+BIBTEXKEY+" extra="BIBTEXKEY">
                  <pre><code class="bibtexraw noread"></code></pre>
            </div>
		<p>
	</div>
</div>
